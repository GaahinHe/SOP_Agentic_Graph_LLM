# SPDX-License-Identifier: MIT
# Production Docker Compose for Agentic Graph LLM Document Pipeline
# Target: RHEL 8/9, Docker 19.03.15+, NVIDIA Tesla L2

version: "3.8"

networks:
  pipeline:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  minio-data: {}
  minio-config: {}
  postgres-data: {}
  redis-data: {}
  qdrant-data: {}
  neo4j-data: {}
  neo4j-logs: {}
  mineru-models: {}
  graphify-models: {}
  agentic-rag-data: {}
  agentic-wiki-data: {}
  shared-cache: {}

services:
  # =============================================================================
  # INFRASTRUCTURE SERVICES
  # =============================================================================

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: pipeline-minio
    hostname: minio
    networks:
      - pipeline
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - minio-config:/root/.minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_DEFAULT_LOCALE: en_US
      MINIO_LOGGER_JSON: "on"
      MINIO_CONSOLE_NETWORK: "0.0.0.0"
      MINIO_UPDATE: "off"
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    privileged: true

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-07-38Z
    container_name: pipeline-minio-init
    networks:
      - pipeline
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - minio-config:/root/.mc
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      /usr/bin/mc mb myminio/documents --ignore-existing &&
      /usr/bin/mc mb myminio/models --ignore-existing &&
      /usr/bin/mc mb myminio/graphs --ignore-existing &&
      /usr/bin/mc anonymous set public myminio/documents &&
      echo 'MinIO initialized successfully'
      "
    restart: "no"
    user: root

  postgres:
    image: postgres:15.6
    container_name: pipeline-postgres
    hostname: postgres
    networks:
      - pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_graph}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_MAX_CONNECTIONS: "200"
      POSTGRES_SHARED_BUFFERS: 4GB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 12GB
      POSTGRES_WORK_MEM: 64MB
      POSTGRES_MAINTENANCE_WORK_MEM: 1GB
      POSTGRES_CHECKPOINT_TIMEOUT: 15min
      POSTGRES_WAL_BUFFERS: 64MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 200
      POSTGRES_RANDOM_PAGE_COST: 1.1
      POSTGRES_LOG_MIN_DURATION_STATEMENT: 1000
      POSTGRES_LOG_LINE_PREFIX: '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=4GB
      -c effective_cache_size=12GB
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
      -c checkpoint_timeout=15min
      -c wal_buffers=64MB
      -c default_statistics_target=200
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
      -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
      -c archive_mode=off
      -c full_page_writes=off
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipeline_user} -d ${POSTGRES_DB:-agentic_graph}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    shm_size: 256m
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: pipeline-redis
    hostname: redis
    networks:
      - pipeline
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --latency-monitor-threshold 100
      --save ""
      --log-level notice
    sysctls:
      net.core.somaxconn: 1024
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # VECTOR DATABASE - Qdrant
  # =============================================================================

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: pipeline-qdrant
    hostname: qdrant
    networks:
      - pipeline
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 32
      QDRANT__SERVICE__MAX_WORKERS: 16
      QDRANT__SERVICE__HTTP_CORS: "*"
      QDRANT__STORAGE__WAL_CAPACITY_MB: 256
      QDRANT__STORAGE__WAL_TIMEOUT_MS: 10000
      QDRANT__STORAGE__OPTIMIZE_TIMEOUT_MS: 3600000
      QDRANT__STORAGE__FLUSH_INTERVAL_SEC: 30
      QDRANT__STORAGE__MAX_SNAPSHOT: 10
      QDRANT__CLUSTER__ENABLED: "false"
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
        limits:
          memory: 12G
        reservations:
          devices:
            - driver: nvidia
              count: 0
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # =============================================================================
  # GRAPH DATABASE - Neo4j
  # =============================================================================

  neo4j:
    image: neo4j:5.14.1
    container_name: pipeline-neo4j
    hostname: neo4j
    networks:
      - pipeline
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 8G
      NEO4J_dbms_memory_pagecache_size: 4G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_default__listener__enabled: "false"
      NEO4J_dbms_logs_debug_level: INFO
      NEO4J_dbms_transaction_timeout: 60s
      NEO4J_dbms_lock_acquisition_timeout: 60s
      NEO4J_dbms_memory_transaction_total_max: 2G
      NEO4J_dbms_memory_buffered_channel_pool_size_max__size: 1000
      NEO4J_dbms_buffered_channel_pool_size_size__of__pool: 1000
      NEO4J_dbms_thread_pool_worker_2_size: 50
      NEO4J_dbms_thread_pool_worker_1_size: 50
      NEO4J_dbms_thread_pool_worker_3_size: 50
      NEO4J_dbms_thread_pool_worker_initial_pool_size: 200
      NEO4J_dbms_thread_pool_worker_min_pool_size: 20
      NEO4J_dbms_thread_pool_worker_keep__alive__time: 10m
      NEO4J_dbms_security_procedures_allow__list: apoc.*
      NEO4J_dbms_logs_transaction_level: INFO
      NEO4J_dbms_transaction_bookmark_ready_timeout: 30s
    command: >
      neo4j
      -c dbms.memory.heap.initial_size=2G
      -c dbms.memory.heap.max_size=8G
      -c dbms.memory.pagecache.size=4G
      -c dbms.security.procedures.unrestricted=apoc.*
      -c dbms.security.default_listener_enabled=false
      -c dbms.logs.debug.level=INFO
      -c dbms.transaction.timeout=60s
      -c dbms.lock.acquisition.timeout=60s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1;' || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  # =============================================================================
  # DOCUMENT PROCESSING MICROSERVICES
  # =============================================================================

  mymupdf:
    build:
      context: ./mymupdf
      dockerfile: Dockerfile
    container_name: pipeline-mymupdf
    hostname: mymupdf
    networks:
      - pipeline
    ports:
      - "8001:8001"
    volumes:
      - shared-cache:/app/cache
      - mineru-models:/models
    environment:
      WORKER_COUNT: ${MYMUPDF_WORKER_COUNT:-4}
      MAX_FILE_SIZE: ${MYMUPDF_MAX_FILE_SIZE:-100MB}
      OCR_ENABLED: ${MYMUPDF_OCR_ENABLED:-true}
      OCR_LANGUAGES: ${MYMUPDF_OCR_LANGUAGES:-eng,chi_sim,chi_tra,jpn,kor}
      TEMP_DIR: /app/cache/tmp
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: documents
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: 4
        reservations:
          memory: 2G
          cpus: 1
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health').raise_for_status()"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  mineru-wrapper:
    build:
      context: ./mineru
      dockerfile: Dockerfile.wrapper
    container_name: pipeline-mineru-wrapper
    hostname: mineru-wrapper
    networks:
      - pipeline
    ports:
      - "8002:8002"
    volumes:
      - shared-cache:/app/cache
      - mineru-models:/models
    environment:
      MINERU_CORE_URL: http://mineru-core:8003
      MINERU_WORKER_COUNT: ${MINERU_WRAPPER_WORKER_COUNT:-4}
      MAX_PAGE_COUNT: ${MINERU_MAX_PAGE_COUNT:-500}
      TEMP_DIR: /app/cache/tmp
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: documents
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentic_graph}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: 8
        reservations:
          memory: 4G
          cpus: 2
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/health').raise_for_status()"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 180s
    restart: unless-stopped
    depends_on:
      mineru-core:
        condition: service_healthy
      redis:
        condition: service_healthy

  mineru-core:
    build:
      context: ./mineru
      dockerfile: Dockerfile.core
    container_name: pipeline-mineru-core
    hostname: mineru-core
    networks:
      - pipeline
    ports:
      - "8003:8003"
    volumes:
      - mineru-models:/models
      - shared-cache:/app/cache
    environment:
      MODEL_CACHE_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKER_THREADS: ${MINERU_CORE_WORKER_THREADS:-4}
      MAX_BATCH_SIZE: ${MINERU_CORE_MAX_BATCH_SIZE:-8}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/transformers
    deploy:
      resources:
        limits:
          memory: 24G
          cpus: 16
        reservations:
          memory: 8G
          cpus: 4
        limits:
          memory: 24G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health').raise_for_status()"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 300s
    restart: unless-stopped

  # =============================================================================
  # KNOWLEDGE GRAPH SERVICE
  # =============================================================================

  graphify:
    build:
      context: ./graphify
      dockerfile: Dockerfile
    container_name: pipeline-graphify
    hostname: graphify
    networks:
      - pipeline
    ports:
      - "8004:8004"
    volumes:
      - graphify-models:/models
      - shared-cache:/app/cache
    environment:
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: document_chunks
      GRAPHIFY_WORKER_COUNT: ${GRAPHIFY_WORKER_COUNT:-4}
      ENTITY_EXTRACTION_MODEL: ${GRAPHIFY_ENTITY_MODEL:-ner}
      RELATION_EXTRACTION_MODEL: ${GRAPHIFY_RELATION_MODEL:-re}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: 8
        reservations:
          memory: 4G
          cpus: 2
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8004/health').raise_for_status()"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # =============================================================================
  # AGENTIC RAG SERVICE
  # =============================================================================

  agentic-rag:
    build:
      context: ./agentic-rag
      dockerfile: Dockerfile
    container_name: pipeline-agentic-rag
    hostname: agentic-rag
    networks:
      - pipeline
    ports:
      - "8005:8005"
    volumes:
      - agentic-rag-data:/app/data
      - shared-cache:/app/cache
    environment:
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: document_chunks
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentic_graph}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 3
      AGENTIC_RAG_MODEL: ${AGENTIC_RAG_MODEL:-gpt-4}
      AGENTIC_RAG_MODEL_API_KEY: ${AGENTIC_RAG_MODEL_API_KEY:-changeme}
      AGENTIC_RAG_MODEL_BASE_URL: ${AGENTIC_RAG_MODEL_BASE_URL:-https://api.openai.com/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_RETRIEVAL_COUNT: ${AGENTIC_RAG_MAX_RETRIEVAL:-20}
      RETRIEVAL_TOP_K: ${AGENTIC_RAG_RETRIEVAL_TOP_K:-10}
      REDIS_CACHE_TTL: ${AGENTIC_RAG_CACHE_TTL:-3600}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: 8
        reservations:
          memory: 4G
          cpus: 2
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8005/health').raise_for_status()"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # =============================================================================
  # AGENTIC WIKI SERVICE
  # =============================================================================

  agentic-wiki:
    build:
      context: ./agentic-wiki
      dockerfile: Dockerfile
    container_name: pipeline-agentic-wiki
    hostname: agentic-wiki
    networks:
      - pipeline
    ports:
      - "8006:8006"
    volumes:
      - agentic-wiki-data:/app/data
      - shared-cache:/app/cache
    environment:
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: wiki_knowledge
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentic_graph}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 4
      WIKI_LANGUAGES: ${WIKI_LANGUAGES:-en,zh}
      WIKI_UPDATE_INTERVAL: ${WIKI_UPDATE_INTERVAL:-86400}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: 6
        reservations:
          memory: 2G
          cpus: 2
        limits:
          memory: 12G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8006/health').raise_for_status()"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # =============================================================================
  # PIPELINE ORCHESTRATOR (Port 8000)
  # =============================================================================

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: pipeline-orchestrator
    hostname: pipeline
    networks:
      - pipeline
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MYMUPDF_URL: http://mymupdf:8001
      GRAPHIFY_URL: http://graphify:8004
      AGENTIC_RAG_URL: http://agentic-rag:8005
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: documents
    volumes:
      - shared-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # =============================================================================
  # KNOWLEDGE MANAGER (Port 8007)
  # =============================================================================

  knowledge-manager:
    build:
      context: ./knowledge-manager
      dockerfile: Dockerfile
    container_name: pipeline-knowledge-manager
    hostname: knowledge-manager
    networks:
      - pipeline
    ports:
      - "8007:8007"
    environment:
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 4
      LLM_API_BASE: ${LLM_API_BASE:-https://api.minimax.io/anthropic}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MAX_TOKENS: 4096
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - shared-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================================================
  # MONITORING (OPTIONAL)
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: pipeline-prometheus
    hostname: prometheus
    networks:
      - pipeline
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.walCompression'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: 1
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.3
    container_name: pipeline-grafana
    hostname: grafana
    networks:
      - pipeline
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: 1
    restart: unless-stopped
    profiles:
      - monitoring